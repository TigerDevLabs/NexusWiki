site_name: NexusPrism Wiki
site_description: Comprehensive documentation for the NexusPrism Minecraft plugin
site_author: O-Tiger
site_url: https://nexusprismwiki.netlify.app/
repo_url: https://github.com/O-Tiger/NexusWiki
repo_name: O-Tiger/NexusWiki
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: pt
          name: Português (BR)
          build: true
          nav_translations:
            Home: Início
            Getting Started: Primeiros Passos
            Modules: Módulos
            Core: Core
            Essentials: Essenciais
            Economy: Economia
            Clans: Clãs
            Security: Segurança
            Discord: Discord
            Crystal Defense: Crystal Defense
            Votifier: Votifier
            Dreams: Sonhos
            Events: Events
            MMO: MMO
            Protections: Proteções
            Custom Mobs: Mobs Personalizados
            Infinity Crafting: Crafting Infinito
            Twitch Integration: Integração Twitch
            TAB: TAB
            Chat: Chat
            Holograms: Hologramas
            Traits: Traits
            RNG: RNG
            Crates: Caixas
            Enchantments: Encantamentos
            ME Storage: Armazenamento ME
            Energy: Energia
            Structures: Estruturas
            Web & GDPR: Web & LGPD
            Reference: Referência
            PlaceholderAPI: PlaceholderAPI
            Permissions: Permissões
            Commands: Comandos
            Developer: Desenvolvedor
            API Guide: Guia da API
            Store: Loja
            Changelog: Histórico
        - locale: es
          name: Español
          build: true
          nav_translations:
            Home: Inicio
            Getting Started: Primeros Pasos
            Modules: Módulos
            Core: Core
            Essentials: Esenciales
            Economy: Economía
            Clans: Clanes
            Security: Seguridad
            Discord: Discord
            Crystal Defense: Crystal Defense
            Votifier: Votifier
            Dreams: Sueños
            Events: Events
            MMO: MMO
            Protections: Protecciones
            Custom Mobs: Mobs Personalizados
            Infinity Crafting: Crafteo Infinito
            Twitch Integration: Integración Twitch
            TAB: TAB
            Chat: Chat
            Holograms: Hologramas
            Traits: Traits
            RNG: RNG
            Crates: Cofres
            Enchantments: Encantamientos
            ME Storage: Almacenamiento ME
            Energy: Energía
            Structures: Estructuras
            Web & GDPR: Web & RGPD
            Reference: Referencia
            PlaceholderAPI: PlaceholderAPI
            Permissions: Permisos
            Commands: Comandos
            Developer: Desarrollador
            API Guide: Guía de la API
            Store: Tienda
            Changelog: Historial

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/O-Tiger/NexusWiki
    - icon: fontawesome/brands/discord
      link: https://discord.gg/invite/WgmfqwPcnS

nav:
